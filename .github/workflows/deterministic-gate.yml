name: Deterministic Gate

on:
  pull_request:
  push:
    tags-ignore:
      - 'v*'
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deterministic-gate:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Run unit tests
        run: npm run test:unit

      - name: Run deterministic Electron gate
        run: npm run test:e2e:gate
